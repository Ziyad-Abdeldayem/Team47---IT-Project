<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="general.css">
  <link rel="stylesheet" href="register.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
  <title>Deluxe - Home</title>
</head>
<body>
  
  <header>
    <nav class="nav">
      <div class="navBar">

        <div class="navBarLeftSec">

          <button class="darkModeToggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">

          </button>
          <a href="Homepage.html" style="text-decoration: none;">
            <h1 class="navBarLogo">
              TEAM47<br>SPORTS
            </h1>
          </a>
          
          <input class="navSearch navBarSearch" type="text" placeholder="Search for Articles...">
          
        </div>

        <div class="navBarRightSec">
          <div class="navBarButtons">
            <a href="contact-us.html">
                <button class="navBarButton">
                Contact Us
                </button>
            </a>

            <a href="login.html">
                <button class="navBarButton">
                Login
                </button>
            </a>
          </div>
          <p class="navBarRegister">Don't have an account?
            <a href="register.html" style="color: rgb(54, 189, 252);">Register</a>
          </p>
        </div>

      </div>
    </nav>
  </header>

  <main>
      <div class="form-wrapper">
        <form class="form-container" id="registerForm">
          <h2 style="margin-bottom: 20px;">Register</h2>

          <div class="form-group">

            <div style="display: flex; gap: 10px;">

                <div style="display: flex; flex-direction: column;">
                <h3>First name:</h3>
                <input class="form-input" id="firstName" type="text" placeholder="John">
                </div>

                <div style="display: flex; flex-direction: column;">
                <h3>Last name:</h3>
                <input class="form-input" id="lastName" type="text" placeholder="Doe">
                </div>

            </div>
            
            <div>
            <h3>Email:</h3>
            <input class="form-input" id="registerEmail" type="email" placeholder="johndoe@gmail.com">
            </div>
           
            <div>
            <h3>Password:</h3>
            <input class="form-input" id="registerPassword" type="password" placeholder="********">
            </div>

            <div>
            <h3>Confirm Password:</h3>
            <input class="form-input" id="confirmPassword" type="password" placeholder="********">
            </div>            
            

          </div>

          <p class="form-message"></p>

          <button class="form-submit" type="submit">Register</button>

          <p class="navBarRegister">Already have an account?
            <a href="login.html" style="color: rgb(54, 189, 252);">Login</a>
          </p>
        </form>
      </div>
  </main>

  <footer>

  </footer>

  <script type="module" src="scripts/general.js"></script>
  <script src="scripts/auth.js"></script>
  <script>
    initAuthNav();
    initRegisterForm();
  </script>
</body>
</html>
